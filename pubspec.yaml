name: map_marker
description: "Map Marker - POI Organizer with Routing & Live Location"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1


  # Routing / Navigation
  flutter_polyline_points: ^2.0.0

  # Geolocation
  geolocator: ^14.0.0
  geocoding: ^4.0.0

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Networking
  dio: ^5.7.0
  http: ^1.3.0

  # Cloud Sync
  google_sign_in: ^6.2.2
  dropbox_client: ^1.2.0
  share_plus: ^10.1.4

  # Storage & Files
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2

  # IAP
  in_app_purchase: ^3.2.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  collection: ^1.19.1
  flutter_slidable: ^3.1.1
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0
  connectivity_plus: ^6.1.3

  # UI
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  flutter_speed_dial: ^7.0.0
  flutter_staggered_animations: ^1.1.1
  fluttertoast: ^8.2.8
  pull_to_refresh: ^2.0.0
  shimmer: ^3.0.0
  flutter_colorpicker: ^1.1.0

  # Crash reporting
  firebase_crashlytics: ^4.3.2
  firebase_core: ^3.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/map_icons/
    - assets/translations/
